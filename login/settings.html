<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — AZ Khonnect Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="supabase.min.js?v=2"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="../img/logo-dark.svg" alt="AZ Khonnect">
        <div>
          <h2>AZ Khonnect</h2>
          <span>Client Portal</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">
          <span class="nav-icon">&#9707;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="request.html">
          <span class="nav-icon">&#10010;</span>
          <span class="nav-label">New Request</span>
        </a>
        <a href="settings.html" class="active">
          <span class="nav-icon">&#9998;</span>
          <span class="nav-label">Settings</span>
        </a>
        <div class="nav-divider"></div>
        <a href="admin.html" id="admin-link" style="display:none;">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Admin Panel</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" onclick="logout(); return false;">
          <span class="nav-icon">&#10132;</span>
          <span>Sign Out</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-toggle" id="mobile-toggle">&#9776;</button>
          <h1>Account Settings</h1>
        </div>
        <div class="topbar-right">
          <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">&#9789;</button>
          <div class="user-avatar" id="user-avatar">?</div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <div class="page-header">
          <h2>Account Settings</h2>
        </div>

        <div class="detail-card" style="max-width:640px;">
          <h3 style="margin-bottom:20px;">Profile</h3>

          <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;">
            <div class="user-avatar" id="settings-avatar" style="width:64px;height:64px;font-size:1.5rem;line-height:64px;">?</div>
            <div>
              <p style="font-weight:600;color:var(--color-text);">Avatar Color</p>
              <div style="display:flex;gap:8px;margin-top:8px;">
                <label style="cursor:pointer;"><input type="radio" name="avatar-color" value="#3da5d9" style="display:none;"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#3da5d9;border:3px solid transparent;" onclick="this.parentElement.querySelector('input').checked=true;this.parentElement.querySelector('input').dispatchEvent(new Event('change'));document.querySelectorAll('input[name=avatar-color]').forEach(i=>{i.parentElement.querySelector('span').style.borderColor='transparent'});this.style.borderColor='var(--color-text)'"></span></label>
                <label style="cursor:pointer;"><input type="radio" name="avatar-color" value="#22c55e" style="display:none;"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#22c55e;border:3px solid transparent;" onclick="this.parentElement.querySelector('input').checked=true;this.parentElement.querySelector('input').dispatchEvent(new Event('change'));document.querySelectorAll('input[name=avatar-color]').forEach(i=>{i.parentElement.querySelector('span').style.borderColor='transparent'});this.style.borderColor='var(--color-text)'"></span></label>
                <label style="cursor:pointer;"><input type="radio" name="avatar-color" value="#ef4444" style="display:none;"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#ef4444;border:3px solid transparent;" onclick="this.parentElement.querySelector('input').checked=true;this.parentElement.querySelector('input').dispatchEvent(new Event('change'));document.querySelectorAll('input[name=avatar-color]').forEach(i=>{i.parentElement.querySelector('span').style.borderColor='transparent'});this.style.borderColor='var(--color-text)'"></span></label>
                <label style="cursor:pointer;"><input type="radio" name="avatar-color" value="#a855f7" style="display:none;"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#a855f7;border:3px solid transparent;" onclick="this.parentElement.querySelector('input').checked=true;this.parentElement.querySelector('input').dispatchEvent(new Event('change'));document.querySelectorAll('input[name=avatar-color]').forEach(i=>{i.parentElement.querySelector('span').style.borderColor='transparent'});this.style.borderColor='var(--color-text)'"></span></label>
                <label style="cursor:pointer;"><input type="radio" name="avatar-color" value="#f97316" style="display:none;"><span style="display:inline-block;width:28px;height:28px;border-radius:50%;background:#f97316;border:3px solid transparent;" onclick="this.parentElement.querySelector('input').checked=true;this.parentElement.querySelector('input').dispatchEvent(new Event('change'));document.querySelectorAll('input[name=avatar-color]').forEach(i=>{i.parentElement.querySelector('span').style.borderColor='transparent'});this.style.borderColor='var(--color-text)'"></span></label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Contact Name</label>
            <input type="text" id="settings-name" class="form-control" placeholder="Your name">
          </div>
          <div class="form-group">
            <label>Company Name</label>
            <input type="text" id="settings-company" class="form-control" placeholder="Your company">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <p id="settings-email" style="padding:10px 14px;background:var(--color-bg);border-radius:var(--radius);color:var(--color-text);font-size:0.95rem;"></p>
            <span class="form-hint">Contact info@az-k.be to change your email address.</span>
          </div>

          <hr style="border:none;border-top:1px solid var(--color-border);margin:24px 0;">

          <h3 style="margin-bottom:16px;">Preferences</h3>
          <div class="form-group">
            <label>Language</label>
            <select id="settings-language" class="form-control">
              <option value="en">English</option>
              <option value="nl">Nederlands</option>
              <option value="fr">Français</option>
            </select>
          </div>
          <div class="form-group" style="display:flex;align-items:center;gap:12px;">
            <label for="settings-darkmode" style="margin:0;">Dark Mode</label>
            <input type="checkbox" id="settings-darkmode" style="width:20px;height:20px;accent-color:var(--color-blue);">
          </div>

          <div style="margin-top:24px;">
            <button id="settings-save" class="btn btn-primary">Save Changes</button>
          </div>

          <hr style="border:none;border-top:1px solid var(--color-border);margin:24px 0;">
          <h3 style="color:var(--color-error);margin-bottom:12px;">Danger Zone</h3>
          <button onclick="logout()" class="btn" style="background:var(--color-error);color:#fff;">Sign Out</button>
        </div>
      </main>
    </div>
  </div>

  <script src="supabase-config.js?v=4"></script>
  <script src="auth.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
