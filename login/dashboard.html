<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — AZ Khonnect Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="supabase.min.js?v=2"></script>
</head>
<body>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <img src="../img/logo-dark.svg" alt="AZ Khonnect">
        <div>
          <h2>AZ Khonnect</h2>
          <span>Client Portal</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active">
          <span class="nav-icon">&#9707;</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="request.html">
          <span class="nav-icon">&#10010;</span>
          <span class="nav-label">New Request</span>
        </a>
        <a href="settings.html">
          <span class="nav-icon">&#9998;</span>
          <span class="nav-label">Settings</span>
        </a>
        <div class="nav-divider"></div>
        <a href="admin.html" id="admin-link" style="display:none;">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Admin Panel</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" onclick="logout(); return false;">
          <span class="nav-icon">&#10132;</span>
          <span>Sign Out</span>
        </a>
      </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="mobile-toggle" id="mobile-toggle">&#9776;</button>
          <h1>Welcome, <span id="welcome-name">...</span></h1>
        </div>
        <div class="topbar-right">
          <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">&#9789;</button>
          <button class="notification-btn" id="notification-btn" title="Notifications">&#128276;</button>
          <div class="user-avatar" id="user-avatar">?</div>
        </div>
      </header>

      <!-- Page Content -->
      <main class="page-content">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-icon">&#128203;</span>
            <div class="stat-label">Total Requests</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">&#9881;</span>
            <div class="stat-label">In Progress</div>
            <div class="stat-value" id="stat-progress">0</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">&#9200;</span>
            <div class="stat-label">Pending Offers</div>
            <div class="stat-value" id="stat-pending">0</div>
          </div>
          <div class="stat-card">
            <span class="stat-icon">&#10004;</span>
            <div class="stat-label">Completed</div>
            <div class="stat-value" id="stat-completed">0</div>
          </div>
        </div>

        <!-- Recent Requests -->
        <div class="section-title">
          <span>Your Requests</span>
          <a href="request.html" class="btn btn-primary btn-sm">+ New Request</a>
        </div>
        <div class="requests-grid" id="requests-list">
          <div class="empty-state">
            <p>Loading...</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="supabase-config.js?v=4"></script>
  <script src="auth.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
